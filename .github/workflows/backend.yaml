name: Backend Deploy
on:
  push:
    branches: [main]
    paths: ['backend/**']

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build & push image
        working-directory: backend
        run: |
          IMAGE=${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy via SSM Run Command
        run: |
          CMD_ID=$(aws ssm send-command \
            --document-name "${{ vars.SSM_DOCUMENT }}" \
            --targets "Key=tag:Name,Values=${{ vars.PROJECT_TAG }}" \
            --parameters "image=${IMAGE}" \
            --query "Command.CommandId" --output text)
          echo "Command: $CMD_ID"
          aws ssm wait command-executed \
            --command-id $CMD_ID \
            --instance-id $(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=${{ vars.PROJECT_TAG }}" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" --output text) || true
